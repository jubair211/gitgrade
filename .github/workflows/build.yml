name: Build and Release
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/binaries/**'
permissions:
  contents: write
jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build aarch64 Linux
        run: |
          cross build --release --target aarch64-unknown-linux-gnu
          mkdir -p docs/binaries
          cp target/aarch64-unknown-linux-gnu/release/gitgrade docs/binaries/gitgrade-aarch64
      - name: Build x86_64 Linux
        run: |
          cross build --release --target x86_64-unknown-linux-gnu
          cp target/x86_64-unknown-linux-gnu/release/gitgrade docs/binaries/gitgrade-x86_64
      - name: Commit Linux binaries
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add docs/binaries/
          git diff --staged --quiet || git commit -m "update linux binaries"
          git push
  build-macos:
    runs-on: macos-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Add targets
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin
      - name: Build macOS x86_64
        run: |
          cargo build --release --target x86_64-apple-darwin
          mkdir -p docs/binaries
          cp target/x86_64-apple-darwin/release/gitgrade docs/binaries/gitgrade-macos-x86_64
      - name: Build macOS aarch64
        run: |
          cargo build --release --target aarch64-apple-darwin
          cp target/aarch64-apple-darwin/release/gitgrade docs/binaries/gitgrade-macos-aarch64
      - name: Commit macOS binaries
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add docs/binaries/
          git diff --staged --quiet || git commit -m "update macos binaries"
          git push
